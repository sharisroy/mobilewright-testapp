name: Mobile Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  MOBILEWRIGHT_DISABLE_TELEMETRY: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Allow the deploy job to publish the HTML report to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't let overlapping runs clobber an in-progress Pages deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Run @smoke on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: default
          profile: pixel_6
          force-avd-creation: true
          emulator-boot-timeout: 900
          emulator-options: >-
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
            -memory 4096
            -no-metrics
          disable-animations: true
          script: |
            set -e

            export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
            export PATH="$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$PATH"
            export MW_DEVICE_ID="test"
            unset ANDROID_SERIAL

            echo "=== Waiting for emulator to fully boot ==="
            adb wait-for-device
            adb shell 'while [ "$(getprop sys.boot_completed)" != "1" ]; do sleep 2; done'
            adb shell 'while [ "$(getprop dev.bootcomplete)" != "1" ]; do sleep 2; done'
            adb shell 'while [ "$(getprop init.svc.bootanim)" != "stopped" ]; do sleep 2; done'
            echo "=== Emulator fully booted ==="

            adb shell input keyevent 82
            adb shell input keyevent 66
            sleep 2

            echo "=== Installing APK ==="
            adb install -r ./APPs/app-debug.apk

            echo "=== Installing mobilewright agent ==="
            npx mobilewright install --device test

            echo "=== Running @smoke tests ==="
            # --retries 2: gesture tests (long-press, swipe) are timing-sensitive
            # on swiftshader emulators — retry gives them a fair chance before failing.
            # --grep-invert "long press": long-press via coordinates is unreliable on
            # headless swiftshader; tag it @regression-only in explore.spec.ts instead.
            MW_DEVICE_ID=test npx mobilewright test --grep "basic user flow: register" --retries 2 --reporter html

      - name: Upload HTML report (downloadable artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload report as Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

  # Publish the HTML report to GitHub Pages. Only on main so PR runs don't
  # overwrite the live report; PRs still get the downloadable artifact above.
  deploy-report:
    needs: android-tests
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
